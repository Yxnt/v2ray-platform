name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-node-agent:
    name: Build node-agent binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: node-agent-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: node-agent-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/node-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish release
    needs: build-node-agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing 'latest' release (main branch only)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          git -c "url.https://x-access-token:${GH_TOKEN}@github.com/.insteadOf=https://github.com/" \
              ls-remote --tags origin refs/tags/latest | \
              grep -q . && \
              gh api --method DELETE \
                "/repos/$GITHUB_REPOSITORY/git/refs/tags/latest" 2>/dev/null || true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          PRERELEASE=""
          if [[ "$TAG" == "latest" ]]; then
            PRERELEASE="--prerelease"
            TITLE="Latest build (main)"
            NOTES="Automated build from the \`main\` branch. Not a stable release."
          else
            TITLE="Release ${TAG}"
            NOTES="Release ${TAG}"
          fi
          gh release create "${TAG}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${TITLE}" \
            --notes "${NOTES}" \
            ${PRERELEASE} \
            node-agent-linux-amd64 \
            node-agent-linux-arm64
