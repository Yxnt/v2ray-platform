name: Build & push to Artifact Registry

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker \
            "${{ vars.GCP_REGION || 'asia-east1' }}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          REGION="${{ vars.GCP_REGION || 'asia-east1' }}"
          PROJECT="${{ vars.GCP_PROJECT }}"
          REPO="${{ vars.GAR_REPO || 'v2ray-platform' }}"
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT}/${REPO}/control-plane"

          docker build \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            .

          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

          echo "Image pushed: ${IMAGE}:${{ github.sha }}"
